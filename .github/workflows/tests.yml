name: QA API Pipeline

on:
  push:
    branches: [ main, tests ]
  pull_request:
    branches: [ main, tests ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qa_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    
    env:
      DATABASE_URL=postgresql://postgres:postgres@localhost:5432/qa_lab
      TEST_DATABASE_URL=postgresql://postgres:postgres@localhost:5432/qa_lab_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-playwright httpx faker

      - name: Run Integration Tests
        run: |
          pytest tests/integration -v